# ============================================================
# PageTutor AI - CI/CD Pipeline (GitHub Actions)
# Author: Mustakim Shaikh (https://github.com/MustakimShaikh01)
#
# Pipeline stages:
# 1. Lint & Type Check (fast feedback)
# 2. Unit Tests + Coverage
# 3. Docker Build (backend + frontend)
# 4. Security Scan (Trivy + SAST)
# 5. Deploy to Staging (on push to main)
# 6. Integration Tests on Staging
# 7. Deploy to Production (on git tag)
# 8. Smoke tests + Canary verification
# ============================================================

name: PageTutor AI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/mustakimshaikh01/pagetutor-backend
  IMAGE_FRONTEND: ghcr.io/mustakimshaikh01/pagetutor-frontend

jobs:

  # ===========================================================
  # JOB 1: Lint & Type Check
  # ===========================================================
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Python deps
        run: |
          pip install ruff mypy black isort
          pip install -r backend/requirements.txt

      - name: Run Ruff linter
        run: ruff check backend/app/

      - name: Check import sorting
        run: isort --check-only backend/app/

      - name: Type check with mypy
        run: mypy backend/app/ --ignore-missing-imports

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: TypeScript check
        run: npm run type-check --prefix frontend

  # ===========================================================
  # JOB 2: Backend Tests
  # ===========================================================
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_pagetutor
          POSTGRES_USER: pagetutor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://pagetutor:test_password@localhost:5432/test_pagetutor
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  # ===========================================================
  # JOB 3: Docker Build
  # ===========================================================
  build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend — Docker metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Frontend — Docker metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================
  # JOB 4: Security Scan
  # ===========================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan (backend image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend.sarif'

      - name: Bandit SAST scan (Python)
        run: |
          pip install bandit
          bandit -r backend/app/ -x backend/app/tests/ -ll

  # ===========================================================
  # JOB 5: Deploy to Staging
  # ===========================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy to Kubernetes (Staging)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          echo "$KUBE_CONFIG" | base64 -d > kubeconfig.yml
          export KUBECONFIG=./kubeconfig.yml
          
          # Rolling update — zero downtime
          kubectl set image deployment/pagetutor-api \
            api=${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }} \
            -n pagetutor-staging
          
          kubectl set image deployment/pagetutor-frontend \
            frontend=${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }} \
            -n pagetutor-staging
          
          kubectl rollout status deployment/pagetutor-api -n pagetutor-staging
          kubectl rollout status deployment/pagetutor-frontend -n pagetutor-staging

  # ===========================================================
  # JOB 6: Deploy to Production (on git tag)
  # ===========================================================
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Canary Deploy (10% traffic)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          echo "$KUBE_CONFIG" | base64 -d > kubeconfig.yml
          export KUBECONFIG=./kubeconfig.yml
          
          # Deploy canary (10% of pods)
          kubectl set image deployment/pagetutor-api-canary \
            api=${{ env.IMAGE_BACKEND }}:${{ github.ref_name }} \
            -n pagetutor-prod
          
          echo "Canary deployed. Monitoring for 5 minutes..."
          sleep 300

      - name: Full Production Rollout
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          export KUBECONFIG=./kubeconfig.yml
          
          # Full production rollout
          kubectl set image deployment/pagetutor-api \
            api=${{ env.IMAGE_BACKEND }}:${{ github.ref_name }} \
            -n pagetutor-prod
          
          kubectl rollout status deployment/pagetutor-api -n pagetutor-prod

      - name: Notify team on Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ PageTutor AI ${{ github.ref_name }} deployed to production by @${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
