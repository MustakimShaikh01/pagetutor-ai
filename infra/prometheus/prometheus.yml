# ============================================================
# PageTutor AI - Prometheus Configuration
# Author: Mustakim Shaikh (https://github.com/MustakimShaikh01)
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: 'pagetutor-ai'
    environment: 'production'

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # FastAPI application metrics
  - job_name: 'pagetutor_api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Celery workers (via Flower)
  - job_name: 'celery_workers'
    static_configs:
      - targets: ['flower:5555']
    metrics_path: '/metrics'

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Nginx metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']

  # Node metrics (host system)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
