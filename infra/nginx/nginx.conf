user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ============================================================
# PageTutor AI - Nginx Configuration
# Author: Mustakim Shaikh (https://github.com/MustakimShaikh01)
#
# Features:
#   - Upstream round-robin load balancing for API
#   - HTTP/2 support
#   - Gzip compression
#   - Rate limiting zones
#   - Security headers
#   - Proxy cache for static assets
# ============================================================

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ----------------------------------------------------------
    # Logging
    # ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time';

    access_log /var/log/nginx/access.log main;

    # ----------------------------------------------------------
    # Performance
    # ----------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;  # Hide nginx version

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ----------------------------------------------------------
    # Rate Limiting Zones (nginx-level, before app)
    # ----------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

    # ----------------------------------------------------------
    # Upstream: API (round-robin load balance across instances)
    # ----------------------------------------------------------
    upstream api_backend {
        least_conn;  # Route to least busy server
        server api:8000 max_fails=3 fail_timeout=30s;
        # Add more api instances here for horizontal scaling:
        # server api_2:8000 max_fails=3 fail_timeout=30s;
        # server api_3:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;  # Keep 32 connections alive per worker
    }

    # ----------------------------------------------------------
    # Upstream: Frontend
    # ----------------------------------------------------------
    upstream frontend_backend {
        server frontend:3000;
        keepalive 16;
    }

    # ----------------------------------------------------------
    # Redirect HTTP → HTTPS
    # ----------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------
    # Main Server Block
    # ----------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name pagetutor.ai www.pagetutor.ai localhost;

        # SSL
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Max upload size (50MB for PDFs)
        client_max_body_size 50M;

        # ----------------------------------------------------------
        # API Routes
        # ----------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long LLM requests
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;   # 5 min for video generation
            proxy_send_timeout 300s;

            # Cookie passthrough (for JWT HttpOnly cookies)
            proxy_cookie_path / "/; SameSite=Lax; Secure; HttpOnly";
        }

        # Stricter rate limit for auth endpoints
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Stricter limit for file uploads
        location /api/v1/upload/ {
            limit_req zone=upload_limit burst=3 nodelay;
            client_max_body_size 50M;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # API Docs
        location ~ ^/(docs|redoc|openapi.json|health|metrics) {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ----------------------------------------------------------
        # Frontend (Next.js SSR)
        # ----------------------------------------------------------
        location / {
            proxy_pass http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Next.js hot reload websocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static assets — cache for 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass http://frontend_backend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ----------------------------------------------------------
        # Flower (Celery Monitor)
        # ----------------------------------------------------------
        location /flower/ {
            proxy_pass http://flower:5555;
            proxy_set_header Host $host;
            auth_basic "Celery Monitor";
        }
    }
}
